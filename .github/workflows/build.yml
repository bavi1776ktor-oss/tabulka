name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Prepare and Export JS Bundle
        run: |
          npm install
          # Принудительная очистка и подготовка JS-бандла перед сборкой Gradle
          rm -rf .expo
          npx expo export --platform android --dump-asset-map
          npx expo prebuild --platform android --clean

      - name: Patch Native Dependencies
        run: |
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true
          sed -i 's/id("expo-module-gradle-plugin")/id("expo.modules.gradle")/g" node_modules/expo-secure-store/android/build.gradle || true

      - name: Compile Native APK via Gradle
        env:
          ORG_GRADLE_PROJECT_expoModulesCorePath: "../node_modules/expo-modules-core/android"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
