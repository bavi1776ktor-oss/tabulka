name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install
          npm install expo@~51.0.0 --save-exact
          npm install expo-secure-store@~13.0.1 @expo/vector-icons react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          npx expo prebuild --platform android --clean

      - name: Inject Configuration
        run: |
          # 1. Добавляем путь к локальному плагину в gradle.properties
          echo "expo.modules.core.path=../node_modules/expo-modules-core/android" >> android/gradle.properties
          
          # 2. Очищаем settings.gradle от лишних блоков, если они там есть, 
          # чтобы избежать ошибки "At most, one pluginManagement block"
          # Мы используем только то, что Expo уже создало, просто добавив туда одну строчку в репозитории
          sed -i '/maven { url "..\/node_modules\/expo-modules-core\/android" }/d' android/settings.gradle
          sed -i '/pluginManagement {/a \        maven { url "../node_modules/expo-modules-core/android" }' android/settings.gradle

          # 3. Фикс совместимости
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
