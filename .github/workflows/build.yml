name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          npm install
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          npx expo prebuild --platform android --clean

      - name: Force Composite Build
        run: |
          # 1. Записываем includeBuild в самый конец settings.gradle
          echo 'includeBuild("../node_modules/expo-modules-core/android")' >> android/settings.gradle
          
          # 2. Правим конфиг модуля, чтобы он использовал локальный проект, а не искал артефакты
          # Мы заменяем подключение плагина в secure-store на прямой вызов
          sed -i 's/id "expo-module-gradle-plugin"/id "expo.modules.gradle"/g' node_modules/expo-secure-store/android/build.gradle
          
          # 3. Фикс совместимости
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
