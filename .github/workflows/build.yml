name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          # Базовая установка зависимостей
          npm install
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Генерируем нативную структуру
          npx expo prebuild --platform android --clean

      - name: Absolute Settings Overwrite Fix v2
        run: |
          # Перезаписываем settings.gradle, убрав проблемную строчку RepositoriesMode.
          # Оставляем только то, что нужно для автолинковки плагинов Expo и React Native.
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              repositories {
                  maven { url new File(settingsDir, "../node_modules/expo-modules-core/android") }
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          
          rootProject.name = 'Табулька'
          
          apply from: new File(settingsDir, "../node_modules/@react-native/gradle-plugin/settings.gradle")
          apply from: new File(settingsDir, "../node_modules/expo/settings.gradle")
          
          include ':app'
          includeBuild('../node_modules/@react-native/gradle-plugin')
          EOF

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Фикс совместимости Gradle 8+ для ядра
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запуск финальной сборки
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
