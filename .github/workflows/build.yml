name: EAS Remote Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      { "name": "Install Dependencies", "run": "npm install && npm install -g eas-cli" }

      # На всякий случай удаляем локальную папку android, чтобы не путать облачный сборщик
      - name: Clean Local Android
        run: rm -rf android

      # Запуск сборки в облаке Expo
      # Флаг --local-credentials сгенерирует подпись автоматически прямо на сервере
      - name: Build APK via EAS
        run: |
          eas build --platform android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
