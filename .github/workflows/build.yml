name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          # Базовая установка зависимостей
          npm install
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Генерируем чистую оригинальную структуру Android
          npx expo prebuild --platform android --clean

      - name: Advanced Plugin Resolution Fix via JS
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'android/settings.gradle';
            
            // Читаем дефолтный, сгенерированный Expo файл настроек
            let content = fs.readFileSync(path, 'utf8');
            
            // Прописываем стратегию разрешения плагина: если запрашивают expo-module-gradle-plugin,
            // мы явно говорим Gradle использовать локальный путь в node_modules.
            const resolutionStrategy = `
                repositories {
                    maven { url new File(settingsDir, "../node_modules/expo-modules-core/android") }
                    google()
                    mavenCentral()
                    gradlePluginPortal()
                }
                resolutionStrategy {
                    eachPlugin {
                        if (requested.id.id == 'expo-module-gradle-plugin') {
                            useModule('expo.modules:expo-module-gradle-plugin:+')
                        }
                    }
                }`;
            
            // Внедряем эту стратегию прямо внутрь РОДНОГО блока pluginManagement
            if (content.includes('pluginManagement {')) {
              content = content.replace('pluginManagement {', 'pluginManagement {' + resolutionStrategy);
              fs.writeFileSync(path, content, 'utf8');
              console.log('Successfully injected advanced resolution strategy into pluginManagement!');
            } else {
              throw new Error('pluginManagement block not found in settings.gradle');
            }

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Фикс совместимости Gradle 8+ для ядра
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запуск сборки APK
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
