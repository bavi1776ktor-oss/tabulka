name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install expo@~51.0.0 react-native-calendars expo-secure-store@~13.0.1 @expo/vector-icons --save-exact

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          npx expo prebuild --platform android

      - name: Bypass Native Plugin Check
        run: |
          # Вместо того чтобы пытаться подключить плагин, мы просто «вырезаем» его применение.
          # Это заставит Gradle игнорировать отсутствие плагина Android в модулях.
          find node_modules/expo-modules-core/android -name "*.gradle" -exec sed -i 's/apply plugin: .com.android.library.//g' {} +
          find node_modules/expo-modules-core/android -name "*.gradle" -exec sed -i 's/id .com.android.library.//g' {} +
          
          # Очищаем settings.gradle от всего, кроме стандартного подключения проекта
          echo 'rootProject.name = "tabulka"
          include ":app"' > android/settings.gradle

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
