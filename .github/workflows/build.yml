name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          npm install
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          npx expo prebuild --platform android --clean

      - name: Final "Force Fix" Settings
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // Мы просто подменяем содержимое файла на "золотой стандарт"
            // Это обходит любые конфликты вложенности блоков
            const newSettings = `
            pluginManagement {
                repositories {
                    gradlePluginPortal()
                    google()
                    mavenCentral()
                    maven { url '../node_modules/expo-modules-core/android' }
                }
            }
            apply plugin: 'org.gradle.toolchains.foojay-resolver-convention'
            rootProject.name = 'tabulka'
            include ':app'
            includeBuild('../node_modules/expo-modules-core/android')
            `;
            fs.writeFileSync('android/settings.gradle', newSettings);
            console.log('Settings.gradle completely replaced with valid structure!');

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
