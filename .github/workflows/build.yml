name: Build Android APK Locally

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Ставим базовые зависимости
      - name: Install JS Dependencies
        run: npm install

      # Установка модулей Expo
      - name: Install Missing Expo Modules
        run: |
          npm install react-native-calendars
          npx expo install expo-secure-store expo-application -- --fix

      # ЖЕСТКИЙ ФИКС: Создаем пустую папку assets и фейковые картинки, чтобы prebuild не падал
      - name: Create Dummy Assets
        run: |
          mkdir -p assets
          touch assets/icon.png
          touch assets/splash.png
          touch assets/adaptive-icon.png

      # Проверяем сборку JS
      - name: Verify JS Bundle
        run: npx expo export --platform android

      # 1. Генерируем папку android с чистого листа
      - name: Generate Android Folder
        run: |
          rm -rf android
          npx expo prebuild --platform android --no-install

      # 2. Лечим баг совместимости Expo + Gradle 8.8
      - name: Patch Expo Modules Core
        run: |
          sed -i 's/components.release/components.findByName("release")/g' node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle

      # 3. Собираем APK
      - name: Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      # 4. Выкатываем готовый APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
