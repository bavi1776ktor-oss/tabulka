name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Split Build Process (Manual Bundling)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # 1. Генерируем нативные папки без установки
          npx expo prebuild --platform android --no-install
          
          # 2. Генерируем временный базовый конфиг Metro, чтобы сборщик не ругался
          echo "const { getDefaultConfig } = require('@expo/metro-config'); const config = getDefaultConfig(__dirname); config.transformer.getTransformOptions = async () => ({ transform: { experimentalImportSupport: false, inlineRequires: true } }); module.exports = config;" > metro.config.js
          
          # 3. Создаем вручную папки для ресурсов Android
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/drawable-mdpi
          
          # 4. Собираем JS бандл напрямую через react-native CLI
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Disable Gradle Internal Bundling and Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку APK, принудительно отключив встроенный вызов Metro
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
