name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Базовая установка
          npm install
          
          # 2. Фиксируем модули в package.json
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild (Full Autolink)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Генерируем нативную структуру
          npx expo prebuild --platform android --clean

      - name: Hard Expo Modules Autolink Repair
        run: |
          # Вызываем внутренний штатный инструмент автолинковки Expo, 
          # чтобы он жестко связал плагины в сгенерированных Gradle-файлах
          npx expo-modules-autolink android

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Исправляем ошибку совместимости с Gradle 8 в самом ядре
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
