name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Базовая установка зависимостей из твоего package.json
          npm install
          
          # 2. Устанавливаем ядро модулей Expo вместе с недостающими пакетами, чтобы нативный плагин Gradle встал на свое место автоматически
          npm install expo-modules-core@~1.12.21 expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Split Build Process (Expo Standard Build)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # 1. Чистая генерация нативной папки Android. Теперь со всеми ядрами модулей
          npx expo prebuild --platform android --clean --no-install
          
          # 2. Исправление нативного бага Expo для совместимости с Gradle 8+
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true
          
          # 3. Создаем папки для готового JS-бандла
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/drawable-mdpi
          
          # 4. Собираем JS бандл отдельно силами Expo компилятора
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file App.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Disable Gradle Internal Bundling and Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Финальная сборка APK
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
