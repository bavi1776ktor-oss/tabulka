name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          npx expo prebuild --platform android --clean

      - name: Final "Dependency Injection" Fix
        run: |
          # 1. Заставляем все проекты (включая изолированные) использовать наши репозитории
          # Это вставка блока 'allprojects' в корневой build.gradle
          sed -i '1i allprojects { buildscript { repositories { google(); mavenCentral() } }; repositories { google(); mavenCentral() } }' android/build.gradle
          
          # 2. Добавляем includeBuild в settings.gradle, чтобы плагин был доступен
          echo 'includeBuild("../node_modules/expo-modules-core/android")' >> android/settings.gradle
          
          # 3. Принудительный патч модуля, чтобы он не искал плагин, а использовал родительский
          sed -i 's/id "expo-module-gradle-plugin"/id "expo.modules.gradle"/g' node_modules/expo-secure-store/android/build.gradle
          
          # 4. Фикс совместимости
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
