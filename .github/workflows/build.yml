name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Ставим базовые зависимости из package.json
          npm install
          
          # 2. Доставляем абсолютно все скрытые модули, которые использует App.js
          npm install expo-secure-store@~5.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Split Build Process (Expo Full Autolink)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
          # Убрали EXPO_OFFLINE, чтобы prebuild без таймаутов скачал шаблон структуры папки
        run: |
          # 1. Чистая генерация нативной папки со всеми автолинками пакетов
          npx expo prebuild --platform android --clean --no-install
          
          # 2. Создаем папки для ассет-бандла
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/drawable-mdpi
          
          # 3. Собираем JS бандл через встроенный компилятор Expo
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file App.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Disable Gradle Internal Bundling and Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Финальная компиляция APK в обход внутреннего забагованного Metro
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
