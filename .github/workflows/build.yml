name: Build Android APK From Scratch

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      # Ставим зависимости
      - name: Install JS Dependencies
        run: |
          npm install
          npm install react-native-calendars expo-secure-store expo-application

      # Проверка бандла
      - name: Verify JS Bundle
        run: npx expo export --platform android

      # 1. Генерируем папку android с нуля
      - name: Generate Android Folder
        run: npx expo prebuild --platform android --no-install

      # 2. ЖЕСТКИЙ ХАК: Глобальный init.gradle скрипт, который принудительно скормит плагин всем модулям
      - name: Patch Generated Gradle
        run: |
          # Вычисляем путь к утилитам expo
          EXPO_UTILS_DIR=$(node -e 'console.log(require("path").dirname(require.resolve("expo/package.json")) + "/utils")')
          echo "Found Expo utils path: $EXPO_UTILS_DIR"
          
          # Создаем глобальный init-скрипт для Gradle
          mkdir -p ~/.gradle
          echo "
          settingsEvaluated { settings ->
              settings.pluginManagement {
                  repositories {
                      maven { url '$EXPO_UTILS_DIR' }
                      gradlePluginPortal()
                      google()
                      mavenCentral()
                  }
              }
          }
          allprojects {
              repositories {
                  maven { url '$EXPO_UTILS_DIR' }
                  google()
                  mavenCentral()
              }
          }
          " > ~/.gradle/init.gradle
          
          # ФИКС КРИТИЧЕСКОЙ ОШИБКИ EXPO + GRADLE 8.8 (SoftwareComponent 'release')
          sed -i 's/components.release/components.findByName("release")/g' node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle

      # 3. Собираем приложение
      - name: Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
