name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          # Устанавливаем всё необходимое ОДНИМ заходом
          npm install
          npm install expo@~51.0.0 react-native-calendars expo-secure-store@~13.0.1 @expo/vector-icons --save-exact

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # ВАЖНО: не используем --clean, чтобы не вычищать установленные пакеты
          npx expo prebuild --platform android

      - name: Patch Native Dependencies
        run: |
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true
          sed -i 's/id("expo-module-gradle-plugin")/id("expo.modules.gradle")/g' node_modules/expo-secure-store/android/build.gradle || true

      - name: Compile Native APK via Gradle
        env:
          ORG_GRADLE_PROJECT_expoModulesCorePath: "../node_modules/expo-modules-core/android"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
