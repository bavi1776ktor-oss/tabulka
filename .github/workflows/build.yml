name: Android Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      # Мы не делаем prebuild, мы не лезем в Gradle. 
      # Мы используем EAS CLI для сборки. 
      # Это единственный способ избежать проблем с плагинами, 
      # потому что EAS сам настраивает окружение.
      - name: Build with EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --non-interactive --local
