name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Базовая установка
          npm install
          
          # 2. Жестко фиксируем нехватку библиотек в package.json до вызова prebuild
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild (Full Autolink)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Разрешаем полноценный пребилд. Он сам поставит нативные связи и сгенерирует правильный settings.gradle
          npx expo prebuild --platform android --clean

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Исправляем известную нативную ошибку совместимости с Gradle 8
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку. Поскольку prebuild отработал штатно, встроенный бандлер Expo выполнится внутри Gradle сам
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
