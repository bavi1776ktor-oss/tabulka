name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Базовая установка
          npm install
          
          # 2. Фиксируем модули в package.json
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild (Full Autolink)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Генерируем нативную структуру
          npx expo prebuild --platform android --clean

      - name: Force Inject Plugin Repository
        run: |
          # Прописываем удаленный Maven репозиторий Expo прямо в pluginManagement нативного проекта,
          # чтобы Gradle мог скачать 'expo-module-gradle-plugin' из сети, если локальный путь не сработал.
          sed -i '/repositories {/a \        maven { url "https://plugins.gradle.org/m2/" }\n        maven { url "https://maven.mozilla.org/maven2/" }' android/settings.gradle
          
          # На всякий случай дублируем репозиторий в build.gradle самого модуля secure-store
          sed -i '1s/^/buildscript { repositories { google(); mavenCentral(); maven { url "https://plugins.gradle.org/m2/" } } }\n/' node_modules/expo-secure-store/android/build.gradle

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Исправляем ошибку совместимости с Gradle 8
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем финальную компиляцию
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
