name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: npm install

      - name: Generate Native Android Folder
        run: |
          npx expo prebuild --platform android --clean
          ls -la # Посмотрит, какие папки создались в корне, чтобы мы видели лог

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Fix Permissions and Build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          if [ -d "android" ]; then
            cd android
            chmod +x gradlew
            ./gradlew clean
            ./gradlew assembleRelease --stacktrace --info
          else
            echo "Ошибка: Папка android так и не появилась после prebuild!"
            exit 1
          fi

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
