name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: npm install

      - name: Generate Native Android Folder
        run: npx expo prebuild --platform android --clean

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Fix Permissions and Build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Записываем весь лог сборки в файл, чтобы не потерять начало ошибки
          ./gradlew assembleRelease --stacktrace > build_log.txt 2>&1 || true
          
          # Если билд упал, выводим последние 100 строк, где кроется причина
          if grep -q "BUILD FAILED" build_log.txt; then
            echo "=== КРИТИЧЕСКАЯ ОШИБКА СБОРКИ ==="
            cat build_log.txt | grep -B 20 -A 10 "FAILED" || tail -n 100 build_log.txt
            exit 1
          fi

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
