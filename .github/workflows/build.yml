name: Build APK Local
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: "true" # Разрешаем стабильную работу окружения
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # Возвращаем проверенную и стабильную версию для Expo 51

      - name: Setup Java (Required for Android Build)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: npm install

      - name: Generate Native Android Folder
        run: npx expo prebuild --platform android --no-install

      - name: Build Android Release APK
        run: |
          cd android && ./gradlew assembleRelease

      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-apk
          path: android/app/build/outputs/apk/release/*.apk
