name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          npm ci || npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Generate and Build Android APK
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
          EXPO_OFFLINE: "1"
          EAS_NO_ERRORS: "1"
          SOURCEMAP_OUTPUT: "/dev/null"
        run: |
          # Принудительно генерируем нативную папку android
          npx expo prebuild --platform android --template blank
          
          # Переходим и собираем
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
