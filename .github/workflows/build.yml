- name: Hardcoded Classpath Injection via JS
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'android/settings.gradle';
            
            let content = fs.readFileSync(path, 'utf8');
            
            // Вместо сложных стратегий мы просто подключаем плагин в classpath корневого билда.
            // Gradle 8.8 увидит его как предопределенный, и спорить не будет.
            const injection = `
            buildscript {
                repositories {
                    google()
                    mavenCentral()
                    maven { url new File(settingsDir, "../node_modules/expo-modules-core/android") }
                }
                dependencies {
                    classpath("expo.modules:expo-module-gradle-plugin:+")
                }
            }`;
            
            if (content.includes('pluginManagement {')) {
              content = content.replace('pluginManagement {', 'pluginManagement {' + injection);
              fs.writeFileSync(path, content, 'utf8');
              console.log('Successfully injected hardcoded classpath!');
            } else {
              throw new Error('pluginManagement block not found');
            }
