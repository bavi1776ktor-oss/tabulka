name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JavaScript Dependencies
        run: |
          # Базовая установка зависимостей
          npm install
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Official Expo CLI Environment
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          expo-version: latest

      - name: Standard Expo Prebuild
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # Генерируем РОДНУЮ и правильную структуру папки android
          npx expo prebuild --platform android --clean

      - name: Safe Injection to Native Repositories
        run: |
          # Мы берем оригинальный, рабочий settings.gradle и ювелирно добавляем 
          # локальный путь к плагину Expo строго внутрь блока поиска плагинов.
          # Больше никакие пути к стандартным скриптам Expo не сломаются.
          sed -i '/pluginManagement {/,/repositories {/ { /repositories {/a \ \ \ \ \ \ \ \ maven { url "${settingsDir}/../node_modules/expo-modules-core/android" }' android/settings.gradle

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Фикс совместимости Gradle 8+ для ядра
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запуск сборки
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
