# 2. ЖЕСТКИЙ ХАК: Безопасное внедрение репозитория плагинов
      - name: Patch Generated Gradle
        run: |
          # Внедряем портал плагинов прямо внутрь существующего блока repositories в settings.gradle
          sed -i '/repositories {/a \        gradlePluginPortal()' android/settings.gradle
          
          # Добавляем репозитории в корневой build.gradle
          sed -i '1i buildscript { repositories { google(); mavenCentral(); maven { url "https://plugins.gradle.org/m2/" } } }' android/build.gradle
