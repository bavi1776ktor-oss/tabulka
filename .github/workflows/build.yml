name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.18.0 # Фиксируем стабильную LTS версию, где Metro не сбоит

      - name: Install JavaScript Dependencies
        run: |
          npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Generate and Build Android APK
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
          NODE_ENV: "production" # Принудительно переводим сборщик в продакшн режим
          SOURCEMAP_OUTPUT: "/dev/null"
        run: |
          # Генерируем нативную структуру
          npx expo prebuild --platform android --no-install
          
          # Переходим в папку android и собираем
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку без загрузки лишних потоков демона
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
