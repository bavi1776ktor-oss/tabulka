name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Standard Expo Prebuild with Native Install
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
        run: |
          # 1. Сначала ставим базовые npm пакеты проекта
          npm install
          
          # 2. Добавляем нехватающие модули в package.json
          npm install expo-secure-store@~15.0.1 @expo/vector-icons@^14.0.0 react-native-calendars --save
          
          # 3. Запускаем ПОЛНЫЙ пребилд БЕЗ флага --no-install. 
          # Это заставит Expo CLI локально скачать и прилинковать все Android-зависимости,
          # включая злополучный expo-module-gradle-plugin.
          npx expo prebuild --platform android --clean

      - name: Hotfix Expo Gradle 8+ Compatibility
        run: |
          # Исправляем ошибку совместимости с Gradle 8 в сгенерированном ядре
          sed -i "s/components.release/components.findByName('release')/g" node_modules/expo-modules-core/android/ExpoModulesCorePlugin.gradle || true

      - name: Compile Native APK via Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку APK. Теперь все локальные плагины на месте.
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
