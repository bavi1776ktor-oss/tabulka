# 2. ЖЕСТКИЙ ХАК: Корректно настраиваем репозитории без дублирования блоков
      - name: Patch Generated Gradle
        run: |
          # Перезаписываем settings.gradle, создавая ОДИН чистый блок pluginManagement
          echo 'pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }' > android/settings.gradle.tmp
          
          # Находим оригинальный файл и дописываем все включения (include) обратно, пропуская старый блок
          tail -n +10 android/settings.gradle >> android/settings.gradle.tmp
          mv android/settings.gradle.tmp android/settings.gradle
          
          # Добавляем репозитории в build.gradle
          sed -i '1i buildscript { repositories { google(); mavenCentral(); maven { url "https://plugins.gradle.org/m2/" } } }' android/build.gradle
