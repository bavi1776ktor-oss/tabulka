name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          npm install

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Generate and Build Android APK
        env:
          # Выделяем Node.js 6 гигабайт памяти вместо 4, чтобы билд не падал по памяти
          NODE_OPTIONS: "--max-old-space-size=6144"
          EXPO_NO_DOCTOR: "1"
          SOURCEMAP_OUTPUT: "/dev/null"
        run: |
          # Генерируем нативную структуру проекта
          npx expo prebuild --platform android --no-install
          
          # Очищаем кэш Metro перед финальной сборкой
          npx metro cache-clean || true
          
          # Переходим и собираем APK
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
