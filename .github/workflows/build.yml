name: Android Local Build

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install JavaScript Dependencies
        run: |
          # 1. Ставим твои базовые зависимости
          npm install
          # 2. Принудительно доставляем пакеты, которые требует App.js, строго под версию твоей Expo 51
          npm install expo-secure-store@~5.0.1 @expo/vector-icons@^14.0.0 --save

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Split Build Process (Expo Full Autolink)
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          EXPO_NO_DOCTOR: "1"
          EXPO_OFFLINE: "1"
        run: |
          # 1. Генерируем папки с автолинковкой пакетов теперь, когда все библиотеки на месте
          npx expo prebuild --platform android --clean
          
          # 2. Создаем папки для ассет-бандла
          mkdir -p android/app/src/main/assets
          mkdir -p android/app/src/main/res/drawable-mdpi
          
          # 3. Собираем JS бандл через встроенный компилятор Expo
          npx expo export:embed \
            --platform android \
            --dev false \
            --entry-file App.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/

      - name: Disable Gradle Internal Bundling and Compile APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          
          # Запускаем сборку APK, полностью исключая повторный вызов забагованной таски Metro
          ./gradlew assembleRelease -x createBundleReleaseJsAndAssets --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabulka-app-release
          path: android/app/build/outputs/apk/release/app-release.apk
